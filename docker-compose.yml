# Docker Compose: backend (FastAPI) + frontend (nginx + собранный SPA).
#
# По умолчанию backend хранит данные в SQLite внутри volume `backend_data`.
# Чтобы переключиться на PostgreSQL, поднимите профиль postgres:
#
#   docker compose --profile postgres up -d --build
#
# и в .env (рядом с этим файлом) задайте DATABASE_URL.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maison-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Maison Couture}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-please-change}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-1209600}
      # По умолчанию — SQLite в volume. При работе с postgres-профилем
      # задайте DATABASE_URL в .env, например:
      #   DATABASE_URL=postgresql+psycopg2://app:app@db:5432/clothing_sales
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/clothing_sales.db}
      UPLOADS_DIR: /app/uploads
      RECEIPTS_DIR: /app/receipts
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
      - backend_receipts:/app/receipts
    expose:
      - "8000"
    # Если хотите дёргать API напрямую без фронта — раскомментируйте:
    # ports:
    #   - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: maison-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

  # Опциональный PostgreSQL. Поднимается только с `--profile postgres`.
  db:
    image: postgres:16-alpine
    container_name: maison-db
    restart: unless-stopped
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clothing_sales}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Не публикуем наружу — backend ходит к нему по сети compose.
    # ports:
    #   - "5432:5432"

volumes:
  backend_data:
  backend_uploads:
  backend_receipts:
  postgres_data:
